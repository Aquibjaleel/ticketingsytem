version: 0.2

env:
  variables:
    REPOSITORY_URI: "218014315265.dkr.ecr.us-east-1.amazonaws.com/my-ecr-repo"
    IMAGE_TAG: "latest"
    SONAR_HOST_URL: "http://your-sonarqube-host:9000"   # <-- update to your SonarQube URL
    SONAR_PROJECT_KEY: "ticketingsystem"                # <-- update to your SonarQube project key
  parameter-store:
    # Snyk API token — same source used by the infra pipeline
    SNYK_TOKEN: "/dev/devops/snyk_token"
    # SonarQube authentication token stored in SSM
    SONAR_TOKEN: "/dev/devops/sonar_token"              # <-- create this SSM param with your SonarQube token

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "========== INSTALLATION PHASE =========="

      # --- Docker Hub credentials (prevent pull-rate limits) ---
      - echo "Retrieving Docker Hub credentials..."
      - SECRET_DATA=$(aws secretsmanager get-secret-value --secret-id aws --query SecretString --output text)
      - USERNAME=$(echo $SECRET_DATA | jq -r .username)
      - PASSWORD=$(echo $SECRET_DATA | jq -r .password)
      - echo "$PASSWORD" | docker login -u "$USERNAME" --password-stdin

      # --- Install Trivy ---
      - echo "Installing Aquasecurity Trivy..."
      - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
      - trivy --version

      # --- Install Snyk CLI ---
      - echo "Installing Snyk CLI..."
      - curl --compressed https://static.snyk.io/cli/latest/snyk-linux -o snyk
      - chmod +x ./snyk
      - mv ./snyk /usr/local/bin/snyk
      - snyk --version

      # --- Install SonarScanner CLI ---
      - echo "Installing SonarScanner CLI..."
      - SONAR_SCANNER_VERSION="6.2.1.4610"
      - curl -sSLo sonar-scanner.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-${SONAR_SCANNER_VERSION}-linux-x64.zip
      - unzip -q sonar-scanner.zip
      - mv sonar-scanner-${SONAR_SCANNER_VERSION}-linux-x64 /opt/sonar-scanner
      - ln -s /opt/sonar-scanner/bin/sonar-scanner /usr/local/bin/sonar-scanner
      - sonar-scanner --version

      # --- Install Python deps for Snyk open-source scan ---
      - pip install -r requirements.txt --quiet

  pre_build:
    commands:
      - echo "========== SECURITY SCANNING PHASE =========="

      # -------------------------------------------------------
      # STEP 1 — TRIVY: Filesystem / dependency vulnerability scan
      # Scans Python packages, OS packages, and secrets in source code.
      # exit-code 0 means the build won't hard-fail (change to 1 to enforce gate).
      # -------------------------------------------------------
      - echo ">>> [1/3] Running Trivy filesystem scan..."
      - |
        trivy fs . \
          --scanners vuln,secret,misconfig \
          --severity HIGH,CRITICAL \
          --format table \
          --output trivy-fs-report.txt \
          --exit-code 0
      - cat trivy-fs-report.txt

      # -------------------------------------------------------
      # STEP 2 — SNYK: Open-source dependency + code analysis
      # Authenticates with the token from SSM, then tests Python deps.
      # '|| true' keeps build alive; remove to enforce a hard gate.
      # -------------------------------------------------------
      - echo ">>> [2/3] Running Snyk security scan..."
      - snyk auth $SNYK_TOKEN
      - snyk test --file=requirements.txt --package-manager=pip --severity-threshold=high --json > snyk-report.json || true
      - snyk code test --severity-threshold=high --json > snyk-code-report.json || true
      - echo "Snyk scan complete. Reports saved to snyk-report.json and snyk-code-report.json"

      # -------------------------------------------------------
      # STEP 3 — SONARQUBE: Static code analysis
      # Sends analysis to your SonarQube server.
      # Requires SONAR_HOST_URL and SONAR_TOKEN to be set above.
      # -------------------------------------------------------
      - echo ">>> [3/3] Running SonarQube analysis..."
      - |
        sonar-scanner \
          -Dsonar.projectKey=$SONAR_PROJECT_KEY \
          -Dsonar.sources=. \
          -Dsonar.exclusions="**/venv/**,**/__pycache__/**,**/migrations/**,**/static/**,**/node_modules/**" \
          -Dsonar.host.url=$SONAR_HOST_URL \
          -Dsonar.token=$SONAR_TOKEN \
          -Dsonar.python.version=3 || true
      - echo "SonarQube scan complete."

      # --- ECR Login (needed before Docker build) ---
      - echo "Logging into Amazon ECR..."
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 218014315265.dkr.ecr.us-east-1.amazonaws.com

  build:
    commands:
      - echo "========== BUILD PHASE =========="
      - echo "Building the Docker image..."
      - docker build -t $REPOSITORY_URI:latest -t $REPOSITORY_URI:$IMAGE_TAG .

      # -------------------------------------------------------
      # TRIVY: Container image scan — runs after image is built
      # Catches vulnerabilities baked into the final image layers.
      # -------------------------------------------------------
      - echo "Running Trivy container image scan..."
      - |
        trivy image \
          $REPOSITORY_URI:latest \
          --severity HIGH,CRITICAL \
          --format table \
          --output trivy-image-report.txt \
          --exit-code 0
      - cat trivy-image-report.txt

  post_build:
    commands:
      - echo "========== POST-BUILD PHASE =========="

      # Upload scan reports as build artifacts (visible in CodeBuild console)
      - echo "Packaging scan reports..."
      - mkdir -p scan-reports
      - cp trivy-fs-report.txt scan-reports/ 2>/dev/null || true
      - cp trivy-image-report.txt scan-reports/ 2>/dev/null || true
      - cp snyk-report.json scan-reports/ 2>/dev/null || true
      - cp snyk-code-report.json scan-reports/ 2>/dev/null || true

      - echo "Pushing the Docker image to ECR..."
      - docker push $REPOSITORY_URI:latest
      - docker push $REPOSITORY_URI:$IMAGE_TAG

      - echo "Connecting to EKS Cluster..."
      - aws eks update-kubeconfig --region us-east-1 --name skillslab-ticketing-cluster-dev

      - echo "Applying Kubernetes manifests..."
      - kubectl apply -f deployment.yml --v=6 --validate=false || { echo "kubectl failed! Check logs above for specific error."; exit 1; }

      - echo "All security scans complete and application deployed to EKS."

artifacts:
  files:
    - scan-reports/**/*
  name: security-scan-reports
